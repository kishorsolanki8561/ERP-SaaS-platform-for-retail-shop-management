# ops/vps/nginx-staging.conf
# Server: 188.241.62.206
# Copy to /etc/nginx/conf.d/erp-staging.conf
# Then: nginx -t && systemctl reload nginx
# SSL: certbot --nginx -d erp-api-staging.preptm.com -d erp-app-staging.preptm.com -d erp-portal-staging.preptm.com

# ── API ──────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name erp-api-staging.preptm.com;

    # Allow larger file uploads (PDF receipts, product images)
    client_max_body_size 20M;

    location / {
        proxy_pass         http://localhost:5155;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        keep-alive;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SignalR long-polling / websockets
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Health probe — no auth required
    location /api/health {
        proxy_pass http://localhost:5155/api/health;
        access_log off;
    }
}

# ── Staff Angular App ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name erp-app-staging.preptm.com;

    root /opt/erp-staging/web;
    index index.html;

    # Angular client-side routing — all paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets forever; never cache index.html
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

# ── Customer Portal ───────────────────────────────────────────────────────────
server {
    listen 80;
    server_name erp-portal-staging.preptm.com;

    root /opt/erp-staging/portal;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
