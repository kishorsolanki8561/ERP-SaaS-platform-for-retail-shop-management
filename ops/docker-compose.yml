services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: erp-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQLSERVER_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
      - ./create-databases.sql:/var/opt/mssql/create-databases.sql
      - ./init-db.sh:/var/opt/mssql/init-db.sh
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd
        -S localhost -U sa -P "$$MSSQL_SA_PASSWORD"
        -Q "SELECT 1" -No
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: erp-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: erp-azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data

  seq:
    image: datalust/seq:latest
    container_name: erp-seq
    ports:
      - "5341:80"
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - seq-data:/data

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: erp-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "${SQLSERVER_SA_PASSWORD}"
    volumes:
      - ./create-databases.sql:/var/opt/mssql/create-databases.sql
    command: >
      bash -c "
        /opt/mssql-tools18/bin/sqlcmd
        -S sqlserver -U sa -P \"$$MSSQL_SA_PASSWORD\"
        -i /var/opt/mssql/create-databases.sql -No
      "
    restart: "no"

volumes:
  mssql-data:
  redis-data:
  azurite-data:
  seq-data:
