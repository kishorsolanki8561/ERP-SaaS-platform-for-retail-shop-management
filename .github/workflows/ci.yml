name: CI — Build, Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest

    # SQL Server service container: GitHub Actions health-checks it with sqlcmd
    # before any step runs, so the integration tests find a ready database on
    # localhost:1433.  IntegrationTestFixture detects INTEGRATION_MSSQL_HOST and
    # skips Testcontainers in CI — Testcontainers is kept for local dev only.
    # JWT settings are in appsettings.Testing.json (loaded via UseEnvironment("Testing")).
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: "Test@1234!StrongPass"
          ACCEPT_EULA: "Y"
          MSSQL_PID: Express
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Test@1234!StrongPass -Q 'SELECT 1' -b -No -C"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/ErpSaas.sln

      - name: Build (Release)
        run: dotnet build src/ErpSaas.sln --configuration Release --no-restore --warnaserror -p:SkipDockerCompose=true

      - name: Install dotnet-ef tool
        run: dotnet tool install --global dotnet-ef --version 8.*

      - name: Check pending model changes
        # Fails the build if any DbContext has entity changes without a migration file.
        # Uses the startup project so TenantDbContext gets all module configurators via
        # the app's full DI (no design-time factories required).
        # Connection strings and JWT:Secret are set to dummy values so the DI container
        # can build without a real SQL Server.  AppInitializationExtensions.InitializeAsync()
        # is wrapped in try/catch so it fails silently when it can't reach the dummy server.
        # The tool aborts the host after Build(), so RunAsync() never actually fires.
        env:
          ConnectionStrings__PlatformDb: "Server=localhost;Database=dt;User Id=sa;Password=Dummy!;TrustServerCertificate=True"
          ConnectionStrings__TenantDb: "Server=localhost;Database=dt;User Id=sa;Password=Dummy!;TrustServerCertificate=True"
          ConnectionStrings__AnalyticsDb: "Server=localhost;Database=dt;User Id=sa;Password=Dummy!;TrustServerCertificate=True"
          ConnectionStrings__LogDb: "Server=localhost;Database=dt;User Id=sa;Password=Dummy!;TrustServerCertificate=True"
          ConnectionStrings__NotificationsDb: "Server=localhost;Database=dt;User Id=sa;Password=Dummy!;TrustServerCertificate=True"
          Jwt__Secret: "CiOnlyPlaceholderSecret_MustBe32CharsLong!"
          Jwt__Issuer: "ci-check"
          Jwt__Audience: "ci-check"
          Hangfire__DisableServer: "true"
        run: |
          dotnet ef migrations has-pending-model-changes \
            --project src/ErpSaas.Infrastructure \
            --startup-project src/ErpSaas.Api \
            --context PlatformDbContext \
            --configuration Release \
            --no-build
          dotnet ef migrations has-pending-model-changes \
            --project src/ErpSaas.Infrastructure \
            --startup-project src/ErpSaas.Api \
            --context TenantDbContext \
            --configuration Release \
            --no-build
          dotnet ef migrations has-pending-model-changes \
            --project src/ErpSaas.Infrastructure \
            --startup-project src/ErpSaas.Api \
            --context AnalyticsDbContext \
            --configuration Release \
            --no-build
          dotnet ef migrations has-pending-model-changes \
            --project src/ErpSaas.Infrastructure \
            --startup-project src/ErpSaas.Api \
            --context LogDbContext \
            --configuration Release \
            --no-build
          dotnet ef migrations has-pending-model-changes \
            --project src/ErpSaas.Infrastructure \
            --startup-project src/ErpSaas.Api \
            --context NotificationsDbContext \
            --configuration Release \
            --no-build

      - name: Unit tests
        run: dotnet test src/ErpSaas.sln --configuration Release --no-build --filter "Category=Unit" --logger "trx;LogFileName=unit-results.trx" --collect:"XPlat Code Coverage"

      - name: Architecture tests
        run: dotnet test src/ErpSaas.Tests.Arch --configuration Release --no-build --logger "trx;LogFileName=arch-results.trx"

      - name: Integration tests
        env:
          INTEGRATION_MSSQL_HOST: localhost
          INTEGRATION_MSSQL_PORT: "1433"
        run: dotnet test src/ErpSaas.sln --configuration Release --no-build --filter "Category=Integration" --logger "trx;LogFileName=integration-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            **/TestResults/*.trx
            **/TestResults/*.xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: '**/coverage.cobertura.xml'
          flags: backend

  frontend-staff:
    name: Frontend — Staff App (Angular)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json

      - name: Install
        working-directory: src/web
        run: npm ci

      - name: Build
        working-directory: src/web
        run: npm run build -- --configuration production

      - name: Lint
        working-directory: src/web
        run: npm run lint -- --max-warnings=0
        continue-on-error: true

  frontend-portal:
    name: Frontend — Customer Portal (Angular)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/web-portal/package-lock.json

      - name: Install
        working-directory: src/web-portal
        run: npm ci

      - name: Build
        working-directory: src/web-portal
        run: npm run build -- --configuration production
