name: Deploy — Staging

on:
  workflow_dispatch:    # manual trigger from GitHub Actions tab
  push:
    branches: [main]   # auto-deploy on every push to main

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'
  VPS_USER: administrator
  VPS_HOST: 204.12.245.106
  API_DEPLOY_DIR: /opt/erp-staging/api
  WEB_DEPLOY_DIR: /opt/erp-staging/web
  PORTAL_DEPLOY_DIR: /opt/erp-staging/portal
  SERVICE_NAME: erp-staging

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/ErpSaas.sln

      - name: Publish
        run: |
          dotnet publish src/ErpSaas.Api \
            --configuration Release \
            --no-restore \
            --output ./artifacts/api

      - uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ./artifacts/api
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  build-staff-app:
    name: Build Staff App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - name: Install & build (staging)
        working-directory: src/web
        run: npm ci && npm run build -- --configuration staging

      - uses: actions/upload-artifact@v4
        with:
          name: web-publish
          path: src/web/dist/web/browser
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  build-portal:
    name: Build Customer Portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/web-portal/package-lock.json

      - name: Install & build (staging)
        working-directory: src/web-portal
        run: npm ci && npm run build -- --configuration staging

      - uses: actions/upload-artifact@v4
        with:
          name: portal-publish
          path: src/web-portal/dist/web-portal/browser
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API → VPS
    needs: build-api
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ./api-publish

      - name: Write .env.staging
        run: |
          cat > ./api-publish/.env.staging <<'ENVEOF'
          ASPNETCORE_ENVIRONMENT=Staging
          ASPNETCORE_URLS=http://0.0.0.0:5000
          ConnectionStrings__PlatformDb=Server=localhost,1433;Database=ErpSaas_PlatformDb;User Id=sa;Password=DBPASS;TrustServerCertificate=True
          ConnectionStrings__TenantDb=Server=localhost,1433;Database=ErpSaas_TenantDb;User Id=sa;Password=DBPASS;TrustServerCertificate=True
          ConnectionStrings__AnalyticsDb=Server=localhost,1433;Database=ErpSaas_AnalyticsDb;User Id=sa;Password=DBPASS;TrustServerCertificate=True
          ConnectionStrings__LogDb=Server=localhost,1433;Database=ErpSaas_LogDb;User Id=sa;Password=DBPASS;TrustServerCertificate=True
          ConnectionStrings__NotificationsDb=Server=localhost,1433;Database=ErpSaas_NotificationsDb;User Id=sa;Password=DBPASS;TrustServerCertificate=True
          Jwt__Secret=JWTSECRET
          Turnstile__SecretKey=TURNSTILEKEY
          PRODUCT_OWNER_EMAIL=POMAIL
          PRODUCT_OWNER_PASSWORD=POPASSWORD
          PRODUCT_OWNER_NAME=PONAME
          ENVEOF
          # Replace placeholders with actual secret values (avoids heredoc expansion issues)
          sed -i "s|DBPASS|${{ secrets.DB_PASSWORD }}|g" ./api-publish/.env.staging
          sed -i "s|JWTSECRET|${{ secrets.JWT_SECRET }}|g" ./api-publish/.env.staging
          sed -i "s|TURNSTILEKEY|${{ secrets.TURNSTILE_SECRET_KEY }}|g" ./api-publish/.env.staging
          sed -i "s|POMAIL|${{ secrets.PRODUCT_OWNER_EMAIL }}|g" ./api-publish/.env.staging
          sed -i "s|POPASSWORD|${{ secrets.PRODUCT_OWNER_PASSWORD }}|g" ./api-publish/.env.staging
          sed -i "s|PONAME|${{ secrets.PRODUCT_OWNER_NAME }}|g" ./api-publish/.env.staging
          # Strip leading whitespace from heredoc indentation
          sed -i 's/^[[:space:]]*//' ./api-publish/.env.staging

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Copy API files to VPS
        run: |
          rsync -avz --delete ./api-publish/ \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:/tmp/erp-staging-api-deploy/
          # Also ship the systemd unit so it stays in sync with the repo
          scp ops/erp-staging.service \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:/tmp/erp-staging.service

      - name: Swap & restart API
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash << 'REMOTE'
          set -euo pipefail
          sudo systemctl stop erp-staging || true
          sudo rm -rf /opt/erp-staging/api/*
          sudo cp -r /tmp/erp-staging-api-deploy/. /opt/erp-staging/api/
          sudo chown -R erp-staging:erp-staging /opt/erp-staging/api
          sudo chmod 600 /opt/erp-staging/api/.env.staging
          # Install / update the systemd unit file and reload the daemon
          sudo cp /tmp/erp-staging.service /etc/systemd/system/erp-staging.service
          sudo systemctl daemon-reload
          sudo systemctl enable erp-staging
          sudo systemctl start erp-staging
          dump_logs() {
            # sudo -n: non-interactive, fail silently if password required
            sudo -n journalctl -u erp-staging --no-pager -n 80 2>/dev/null \
              || journalctl -u erp-staging --no-pager -n 80 2>/dev/null \
              || echo "(journal unavailable — check VPS sudoers or systemd-journal group)"
          }
          echo "Waiting for service to become active (migrations may take up to 90s)..."
          REACHED_ACTIVE=0
          for i in $(seq 1 18); do
            # systemctl is-active is unprivileged — no sudo needed
            STATUS=$(systemctl is-active erp-staging 2>/dev/null || true)
            echo "  check $i/18: $STATUS"
            if [ "$STATUS" = "active" ]; then
              echo "Service is active."
              REACHED_ACTIVE=1
              break
            fi
            if [ "$STATUS" = "failed" ]; then
              echo "Service failed to start. Last 80 log lines:"
              dump_logs
              exit 1
            fi
            sleep 5
          done
          if [ "$REACHED_ACTIVE" = "0" ]; then
            FINAL=$(systemctl is-active erp-staging 2>/dev/null || true)
            echo "Service did not become active within 90s (status: $FINAL). Last 80 log lines:"
            dump_logs
            exit 1
          fi
          rm -rf /tmp/erp-staging-api-deploy
          REMOTE

      - name: Purge Cloudflare cache (API)
        run: |
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://erp-api-staging.preptm.com/health","https://erp-api-staging.preptm.com/api/services"]}' \
          || echo "Cloudflare purge skipped (secret not configured)"

  # ────────────────────────────────────────────────────────────────────────────
  deploy-staff-app:
    name: Deploy Staff App → VPS
    needs: build-staff-app
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-publish
          path: ./web-publish

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Copy staff app to VPS
        run: |
          rsync -avz --delete ./web-publish/ \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:/tmp/erp-staging-web-deploy/

      - name: Swap web files
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash << 'REMOTE'
          set -euo pipefail
          sudo mkdir -p /opt/erp-staging/web
          sudo rm -rf /opt/erp-staging/web/*
          sudo cp -r /tmp/erp-staging-web-deploy/. /opt/erp-staging/web/
          sudo chown -R www-data:www-data /opt/erp-staging/web
          rm -rf /tmp/erp-staging-web-deploy
          REMOTE

      - name: Purge Cloudflare cache (staff app)
        run: |
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://erp-app-staging.preptm.com/","https://erp-app-staging.preptm.com/index.html"]}' \
          || echo "Cloudflare purge skipped (secret not configured)"

  # ────────────────────────────────────────────────────────────────────────────
  deploy-portal:
    name: Deploy Customer Portal → VPS
    needs: build-portal
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portal-publish
          path: ./portal-publish

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Copy portal to VPS
        run: |
          rsync -avz --delete ./portal-publish/ \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:/tmp/erp-staging-portal-deploy/

      - name: Swap portal files
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash << 'REMOTE'
          set -euo pipefail
          sudo mkdir -p /opt/erp-staging/portal
          sudo rm -rf /opt/erp-staging/portal/*
          sudo cp -r /tmp/erp-staging-portal-deploy/. /opt/erp-staging/portal/
          sudo chown -R www-data:www-data /opt/erp-staging/portal
          rm -rf /tmp/erp-staging-portal-deploy
          REMOTE

      - name: Purge Cloudflare cache (portal)
        run: |
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://erp-portal-staging.preptm.com/","https://erp-portal-staging.preptm.com/index.html"]}' \
          || echo "Cloudflare purge skipped (secret not configured)"
